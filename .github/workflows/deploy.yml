name: CI/CD Deployment

on:
  push:
    branches:
      - master

permissions:
  packages: write
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Syntax Errors
        run: |
          python -m py_compile main.py

  build-and-push-image:
    needs: test-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Create a placeholder credentials file so the Docker build succeeds on GitHub's runner
      - name: Inject Mock Credentials Placeholder
        run: echo "{}" > credentials.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/travel-bot:latest

  deploy-to-gcp:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Remote SSH Deployment Execute
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/travel-bot:latest
            docker stop travel_bot || true
            docker rm travel_bot || true
            
            # Run the container using port 80 and inject the VM's environmental keys
            docker run -d \
              -p 80:8000 \
              --name travel_bot \
              --restart always \
              --e GCP_PROJECT_id="emerald-vent-384708" \
              ghcr.io/${{ github.repository_owner }}/travel-bot:latest

