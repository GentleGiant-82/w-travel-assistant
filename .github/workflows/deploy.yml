name: CI/CD Deployment

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Syntax Errors
        run: |
          python -m py_compile main.py

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: test-and-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. This new step converts your username to lowercase safely
      - name: Convert repository name to lowercase
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 2. Swap out github.repository for your new lowercase env variable
          tags: ghcr.io/${{ env.REPO_LOWERCASE }}:latest

  deploy-to-gcp:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Remote SSH Deployment Execute
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Authenticate the VM's local Docker daemon to GitHub Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ghcr.io/${REPO_LOWER}:latest
            
            docker stop travel-bot || true
            docker rm travel-bot || true
            
            docker run -d \
              -p 80:8000 \
              --name travel-bot \
              --restart unless-stopped \
              -e GCP_PROJECT_ID="emerald-vent-384708" \
              ghcr.io/${REPO_LOWER}:latest
